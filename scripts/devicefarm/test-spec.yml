version: 0.1

phases:
  install:
    commands:
      - echo "no install dependencies"

  pre_test:
    commands:
      - echo "pre_test start"
      - ADB="adb -s $DEVICEFARM_DEVICE_UDID"
      - $ADB wait-for-device
      - echo "device=$($ADB shell getprop ro.product.cpu.abi) sdk=$($ADB shell getprop ro.build.version.sdk) model=$($ADB shell getprop ro.product.model)"
      - $ADB shell pm list packages | grep com.cory.app || (echo "FAIL com.cory.app not installed"; exit 10)
      - $ADB shell am start -W -n com.cory.app/.ComposeSandboxActivity
      - echo "DEVICEFARM_TEST_PACKAGE_PATH=$DEVICEFARM_TEST_PACKAGE_PATH"
      - ls -la $DEVICEFARM_TEST_PACKAGE_PATH || true

  test:
    commands:
      - |
        set -eu
        ADB="adb -s $DEVICEFARM_DEVICE_UDID"
        INNER_SH="$DEVICEFARM_TEST_PACKAGE_PATH/inner-smoke.sh"

        if [ ! -f "$INNER_SH" ]; then
          echo "FAIL inner-smoke.sh missing at $INNER_SH"
          ls -la "$DEVICEFARM_TEST_PACKAGE_PATH" || true
          exit 10
        fi

        echo "=========================================================="
        echo " waiting for CoryTerminalRuntime to extract binaries"
        echo "=========================================================="
        READY=0
        for i in $(seq 1 180); do
          if $ADB shell run-as com.cory.app test -e files/usr/bin/git 2>/dev/null; then
            echo "runtime ready after ${i}s"
            READY=1
            break
          fi
          sleep 1
        done
        [ "$READY" = "1" ] || { echo "FAIL runtime never ready"; exit 11; }

        # Resolve nativeLibraryDir. With useLegacyPackaging=true the APK's
        # lib/arm64-v8a/*.so should be extracted under <codePath>/lib/arm64.
        echo "=========================================================="
        echo " looking up nativeLibraryDir via codePath"
        echo "=========================================================="
        CODE_PATH=$($ADB shell dumpsys package com.cory.app 2>/dev/null \
          | tr -d '\r' \
          | grep -Eo 'codePath=[^ ]+' \
          | head -1 \
          | cut -d= -f2-)
        echo "codePath=$CODE_PATH"
        [ -n "$CODE_PATH" ] || { echo "FAIL no codePath"; exit 11; }

        NATIVE_LIB=""
        for cand in "$CODE_PATH/lib/arm64" "$CODE_PATH/lib/arm64-v8a" "$CODE_PATH/lib"; do
          if $ADB shell test -d "$cand" 2>/dev/null; then
            if $ADB shell test -e "$cand/libpython3.14.so" 2>/dev/null; then
              NATIVE_LIB="$cand"
              echo "found $cand (contains libpython3.14.so)"
              break
            else
              echo "$cand exists but has no libpython3.14.so"
              $ADB shell ls -la "$cand" 2>&1 || true
            fi
          fi
        done

        if [ -z "$NATIVE_LIB" ]; then
          echo "FAIL no lib dir with libpython3.14.so under $CODE_PATH"
          echo "---- $CODE_PATH contents ----"
          $ADB shell ls -la "$CODE_PATH" 2>&1 || true
          if $ADB shell test -d "$CODE_PATH/lib" 2>/dev/null; then
            echo "---- $CODE_PATH/lib contents ----"
            $ADB shell ls -laR "$CODE_PATH/lib" 2>&1 | head -50 || true
          fi
          echo "---- dumpsys package excerpt ----"
          $ADB shell dumpsys package com.cory.app 2>&1 \
            | tr -d '\r' \
            | grep -iE 'extractnative|legacynative|native|codepath|primarycpu' \
            | head -10
          exit 11
        fi

        echo ""
        echo "=========================================================="
        echo " pushing inner-smoke.sh to device and running it"
        echo "=========================================================="
        DEVICE_SH=/data/local/tmp/cory-smoke-inner.sh
        $ADB push "$INNER_SH" "$DEVICE_SH"
        $ADB shell chmod 644 "$DEVICE_SH"

        # Run as the app UID. sh reads the file directly, no stdin piping.
        # Output comes back through adb shell's stdout, cleanly.
        $ADB shell run-as com.cory.app sh "$DEVICE_SH" "$NATIVE_LIB"
        INNER_RC=$?
        echo "inner script exit=$INNER_RC"
        [ "$INNER_RC" = "0" ] || exit "$INNER_RC"

        # Note: Device Farm's APPIUM_NODE result parser doesn't read
        # arbitrary JUnit XML files from $DEVICEFARM_LOG_DIR — we tried.
        # Its UI marks "Tests Suite" as FAILED no matter what we do
        # because we're using the test type as a vehicle for a custom
        # shell script, not a real Appium test. The truth is in the
        # `Test spec output` artifact, which scripts/devicefarm/run.py
        # parses for the ALL_TESTS_PASSED sentinel and uses as the
        # actual gate. Ignore the Device Farm UI; trust the runner's
        # exit code.

        echo "=========================================================="
        echo " smoke test completed successfully"
        echo "=========================================================="

  post_test:
    commands:
      - adb -s $DEVICEFARM_DEVICE_UDID logcat -d -s TerminalBootstrap:V CoryTerminalRuntime:V AndroidRuntime:E DEBUG:V System.err:W > $DEVICEFARM_LOG_DIR/logcat.txt 2>&1 || true

artifacts:
  - $DEVICEFARM_LOG_DIR
