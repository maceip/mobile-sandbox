name: Build Cory APK

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      next-tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;27.2.12479018" "cmake;3.22.1" || true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Fetch prebuilt assets
        run: |
          python3 scripts/build_all_assets.py --fetch-prebuilt --skip-app
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Determine next version tag
        id: version
        if: success() && github.event_name == 'push'
        run: |
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v0.0.1"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "Next release: $NEXT_TAG"

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cory-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # Real-device smoke test on AWS Device Farm. Installs the APK on the
  # Top Devices pool (currently Pixel 9, Pixel 9 Pro XL, Galaxy A36,
  # Galaxy S24+, Galaxy Tab S9), launches the main activity, and
  # exercises node, python3, git, git worktree inside the app sandbox
  # via `adb shell run-as com.cory.app sh`. The runner in
  # scripts/devicefarm/run.py parses the Test spec output artifact
  # from every job and exits 0 only if every device saw the
  # ALL_TESTS_PASSED sentinel. ~2-3 min total, ~$1 per push.
  #
  # Skipped (not failed) if the AWS secrets are not configured on the
  # repo, so forks/first-time pushes still get a build + release path.
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      status: ${{ steps.run.outputs.status }}

    steps:
      - uses: actions/checkout@v4

      - name: Check for AWS secrets
        id: have-aws
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            echo "have=true" >> "$GITHUB_OUTPUT"
          else
            echo "have=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AWS secrets missing; Device Farm smoke test will be skipped. Set AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, DEVICEFARM_PROJECT_ARN, DEVICEFARM_POOL_ARN as repo secrets to enable it."
          fi

      - name: Download APK artifact
        if: steps.have-aws.outputs.have == 'true'
        uses: actions/download-artifact@v4
        with:
          name: cory-apk
          path: ./

      - name: Set up Python
        if: steps.have-aws.outputs.have == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install boto3
        if: steps.have-aws.outputs.have == 'true'
        run: pip install --quiet boto3

      - name: Run Device Farm smoke test
        id: run
        if: steps.have-aws.outputs.have == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-west-2
          DEVICEFARM_PROJECT_ARN: ${{ secrets.DEVICEFARM_PROJECT_ARN }}
          DEVICEFARM_POOL_ARN: ${{ secrets.DEVICEFARM_POOL_ARN }}
          APK_PATH: ./app-debug.apk
        run: |
          python3 scripts/devicefarm/run.py
          echo "status=passed" >> "$GITHUB_OUTPUT"

      - name: Record skip
        if: steps.have-aws.outputs.have != 'true'
        id: skip
        run: echo "status=skipped" >> "$GITHUB_OUTPUT"

  release:
    needs: [build, smoke-test]
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: cory-apk
          path: ./

      - name: Create release with semver tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.build.outputs.next-tag }}" \
            app-debug.apk \
            --title "${{ needs.build.outputs.next-tag }}" \
            --generate-notes \
            --latest
