name: Build Cory APK

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      next-tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;27.2.12479018" "cmake;3.22.1" || true

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Fetch prebuilt assets
        run: |
          python3 scripts/build_all_assets.py --fetch-prebuilt --skip-app
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Determine next version tag
        id: version
        if: success() && github.event_name == 'push'
        run: |
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v0.0.1"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "Next release: $NEXT_TAG"

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cory-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # Runs the APK on a real Android emulator and physically invokes
  # `node -v`, `python3 -c 'print(1+1)'`, `git init`, `git worktree list`
  # inside the app sandbox via `run-as`. Fails the build if any of
  # those commands don't produce the expected output.
  #
  # This is the durable fix for "nobody tests the APK before shipping".
  # Every push has to pass this job before it can cut a release.
  #
  # Emulator: arm64-v8a API 30 (Android 11). arm64 because our APK
  # only ships arm64 binaries (node, python, ripgrep, bash, busybox,
  # git). API 30 because it avoids API-33 foreground-service and
  # POST_NOTIFICATIONS friction without being too old.
  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: cory-apk
          path: ./

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-smoke-arm64-30-v1

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: arm64-v8a
          target: default
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD created and snapshot cached"

      - name: Run smoke test on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: arm64-v8a
          target: default
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set -eux

            adb wait-for-device
            adb shell 'while [ -z "$(getprop sys.boot_completed)" ]; do sleep 1; done;'

            # Install the APK we just built
            adb install -r -t app-debug.apk

            # Launch main activity so CoryTerminalRuntime.ensureReady()
            # extracts assets/python/ into filesDir and symlinks
            # filesDir/python/bin/* -> filesDir/usr/bin/*
            adb shell am start -W -n com.cory.app/.ComposeSandboxActivity

            # Wait up to 120s for the runtime extraction to finish.
            # The canary is filesDir/usr/bin/git existing (it's the
            # last symlink created by linkBundledTools()).
            READY=0
            for i in $(seq 1 120); do
              if adb shell run-as com.cory.app test -e files/usr/bin/git 2>/dev/null; then
                echo "runtime ready after ${i}s"
                READY=1
                break
              fi
              sleep 1
            done
            if [ "$READY" != "1" ]; then
              echo "ERROR: runtime never became ready — dumping logcat"
              adb logcat -d -s TerminalBootstrap:V CoryTerminalRuntime:V AndroidRuntime:E | tail -200
              exit 1
            fi

            # Look up the app's nativeLibraryDir so we can put it on
            # LD_LIBRARY_PATH. libpython3.14.so lives there.
            NATIVE_LIB=$(adb shell dumpsys package com.cory.app \
              | tr -d '\r' \
              | grep -Eo 'nativeLibraryDir=[^ ]+' \
              | head -1 \
              | cut -d= -f2)
            echo "nativeLibraryDir=$NATIVE_LIB"

            # Pipe the whole smoke test as a heredoc into
            # `adb shell run-as com.cory.app sh`. This avoids the
            # quoting hell of trying to nest sh -c '...' through adb
            # shell through run-as. The inner script inherits NATIVE_LIB
            # via environment variable substitution performed by
            # the outer bash, then the rest runs inside the app's
            # UID + sandbox.
            export NATIVE_LIB
            adb shell run-as com.cory.app sh <<SCRIPT
            set -eux

            APP_FILES=/data/data/com.cory.app/files
            cd "\$APP_FILES"

            export PATH="\$APP_FILES/usr/bin:/system/bin:/system/xbin"
            export LD_LIBRARY_PATH="\$APP_FILES/usr/lib:${NATIVE_LIB}"
            export HOME="\$APP_FILES/home"
            export TMPDIR="\$APP_FILES/tmp"
            mkdir -p "\$HOME" "\$TMPDIR"

            echo ""
            echo "=========================================================="
            echo " 1. node -v"
            echo "=========================================================="
            NODE_OUT=\$(node -v)
            echo "\$NODE_OUT"
            case "\$NODE_OUT" in
              v[0-9]*) ;;
              *) echo "FAIL: node -v did not print a version"; exit 11 ;;
            esac
            echo "OK"

            echo ""
            echo "=========================================================="
            echo " 2. python3 -c print(1+1)"
            echo "=========================================================="
            PY_OUT=\$(python3 -c "print(1+1)")
            echo "\$PY_OUT"
            if [ "\$PY_OUT" != "2" ]; then
              echo "FAIL: python3 did not print 2"
              exit 12
            fi
            echo "OK"

            echo ""
            echo "=========================================================="
            echo " 3. git init + git worktree list (new empty repo)"
            echo "=========================================================="
            rm -rf "\$HOME/smoketest" "\$HOME/smoketest-wt"
            mkdir -p "\$HOME/smoketest"
            cd "\$HOME/smoketest"
            git init .
            echo hi > a
            git -c user.email=ci@cory.app -c user.name=CI add a
            git -c user.email=ci@cory.app -c user.name=CI commit -m init
            WT_LIST=\$(git worktree list)
            echo "\$WT_LIST"
            # Our worktree.c prints "(no worktrees)" when the list is empty.
            echo "\$WT_LIST" | grep -q "no worktrees" || {
              echo "FAIL: git worktree list did not print the expected '(no worktrees)' sentinel"
              exit 13
            }
            echo "OK"

            echo ""
            echo "=========================================================="
            echo " 4. git worktree add (exercises git_worktree_add)"
            echo "=========================================================="
            git worktree add "\$HOME/smoketest-wt"
            WT_LIST2=\$(git worktree list)
            echo "\$WT_LIST2"
            echo "\$WT_LIST2" | grep -q "smoketest-wt" || {
              echo "FAIL: second git worktree list did not show the new worktree"
              exit 14
            }
            echo "OK"

            echo ""
            echo "=========================================================="
            echo " ALL SMOKE TESTS PASSED"
            echo "=========================================================="
            SCRIPT

      - name: Dump logcat on failure
        if: failure()
        run: |
          adb logcat -d -s TerminalBootstrap:V CoryTerminalRuntime:V AndroidRuntime:E System.err:W DEBUG:V | tail -500 || true

  # Release only runs if BOTH build and smoke-test succeed. Broken APKs
  # never ship. This is the gate that makes "our demos work" a durable
  # invariant instead of a per-person discipline problem.
  release:
    needs: [build, smoke-test]
    if: success() && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: cory-apk
          path: ./

      - name: Create release with semver tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.build.outputs.next-tag }}" \
            app-debug.apk \
            --title "${{ needs.build.outputs.next-tag }}" \
            --generate-notes \
            --latest
